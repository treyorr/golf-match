<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Background sphere gradient to give 3D volume -->
    <radialGradient id="sphereGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="65%" stop-color="#f8fafc" />
      <stop offset="90%" stop-color="#e2e8f0" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </radialGradient>
    
    <!-- Subtle shadow gradient for the entire golf ball -->
    <radialGradient id="ballShadow" cx="50%" cy="50%" r="50%">
      <stop offset="80%" stop-color="#0f172a" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Outer soft shadow under the ball -->
  <ellipse cx="100" cy="105" rx="90" ry="88" fill="url(#ballShadow)" />

  <!-- The Main Golf Ball Sphere -->
  <circle cx="100" cy="100" r="88" fill="url(#sphereGrad)" stroke="#94a3b8" stroke-width="1.5" />

  <!-- Dimples (using shadow/highlight pair for crisp 3D indent effect) -->
